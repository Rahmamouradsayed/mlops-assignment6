name: ML Model CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pylint torch
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create src directory if not exists
        run: |
          mkdir -p src
          touch src/__init__.py

      - name: Linter Check
        run: |
          pylint src/ --disable=all --enable=E --exit-zero || true

      - name: Model Dry Test
        run: |
          python -c "import torch; print('Model environment ready!')"

      - name: Upload README as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-doc
          path: README.md
