name: Resource-Efficient CI/CD with Gatekeeper

on:
  push:
    branches: [ main ]

jobs:

  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint
        run: echo "lint passed"

  train:
    needs: linter
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Train
        run: echo "training success"

      - name: Upload logs on failure
        if: failure()
        run: echo "error" > error_logs.txt

      - name: Upload artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
