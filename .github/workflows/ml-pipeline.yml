name: Resource-Efficient CI/CD with Gatekeeper

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run linter
        run: |
          echo "Running lightweight linter..."
          echo "Linter passed successfully"

  train:
    needs: [linter]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' && 
      contains(github.event.head_commit.message, '[run-train]')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup GPU environment
        run: echo "GPU environment ready"
      
      - name: Run training
        id: training
        run: |
          echo "Starting expensive training..."
          echo "Training completed"
      
      - name: Generate error logs on failure
        if: failure()
        run: |
          echo "Training failed" > error_logs.txt
          echo "Timestamp: $(date)" >> error_logs.txt
          echo "Branch: ${{ github.ref_name }}" >> error_logs.txt
      
      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error_logs
          path: error_logs.txt

  cleanup:
    needs: [linter, train]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Cleanup
        run: echo "Cleaning up temporary cloud volumes..."
